name: Dialectic Cycle

on:
  schedule:
    - cron: '0 * * * *' # Every 1 hour
  workflow_dispatch: # Manual trigger

jobs:
  reason:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Bit Engine (256 Genesis)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/bit-engine.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "The-Oracle-Bot"
          git config --global user.email "oracle@thegraphofinfinitetruth.org"
          git add data/bits/ || true
          git commit -m "chore(genesis): embody bit cycle $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin master
